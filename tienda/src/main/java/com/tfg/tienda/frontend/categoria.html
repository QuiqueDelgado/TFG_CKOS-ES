<!DOCTYPE html>
<!--
  categoria.html — Grid de productos filtrado por categoría

  Recibe el filtro mediante ?cat=<nombre> en la URL.
  app.js cargarProductosPorCategoria() lee ese parámetro, obtiene el listado
  completo de /productos y filtra por categoria.nombre (insensible a mayúsculas).
  El resultado se pinta en #gridProductos con la clase .grid-categoria (4 columnas
  en desktop, 2 en tablet, 1 en movil segun style.css).
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categoría</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header-container"></div>

<main>
  <h2 id="tituloCategoria"></h2>
  <div id="gridProductos" class="grid-categoria"></div>
</main>

<div id="footer-container"></div>

<!-- OVERLAY -->
<div id="overlayCarrito" class="overlay" onclick="cerrarCarrito()"></div>

<!-- PANEL CARRITO -->
<div id="miniCarrito" class="mini-carrito">
  <h3>Carrito</h3>
  <div id="contenidoCarrito"></div>
</div>
<script src="app.js"></script>
</body>
</html>
