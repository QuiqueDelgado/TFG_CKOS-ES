<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Producto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div id="header-container"></div>
</header>

<main class="detalle">

  <h1 id="nombre"></h1>
  
  <div class="detalle-container">

    <!-- IMAGEN -->
    <div class="imagen"></div>

    <!-- INFO -->
    <div class="info">
      <p id="descripcion"></p>
      <ul id="caracteristicas"></ul>

  <!-- OPCIONES -->

  <div class="opciones">
    <label><input type="radio" name="force" value="40g"> 40g</label>
    <label><input type="radio" name="force" value="45g"> 45g</label>
    <label><input type="radio" name="force" value="50g"> 50g</label>
  </div>

  <div class="compra">

    <!-- CANTIDAD -->
    <div class="cantidad">
      <button id="menos">-</button>
      <input type="number" id="qty" value="1" min="1">
      <button id="mas">+</button>
    </div>

    <!-- BOTÓN -->
    <button id="btnAdd">Añadir al carrito</button>
  </div>

</div>

  </div>
</main>

<!-- FOOTER FIJO -->
<footer>
  <div id="footer-container"></div>
</footer>

<!-- OVERLAY -->
<div id="overlayCarrito" class="overlay" onclick="cerrarCarrito()"></div>

<!-- PANEL CARRITO -->
<div id="miniCarrito" class="mini-carrito">
  <h3>Carrito</h3>
  <div id="contenidoCarrito"></div>
</div>

<script src="app.js"></script>
<script src="producto.js"></script>
</body>
</html>
