<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CKOS-ES</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div id="header-container"></div>
</header>

<main>

<div class="hero-producto">
  <img src="http://localhost:8080/img/productos/cases/Athena1800Banner.png" alt="Athena 1800">

  <div class="hero-info">
    <span class="badge">Nuevo</span>
    <h2>Athena 1800</h2>
    <p>Diseño premium 1800 compact con acabados de aluminio.</p>
    <button onclick="verProducto(27)">Ver producto</button>
  </div>

</div>
  <!-- ===== CASES ===== -->
  <div class="seccion">
    <h2>Cases</h2>
    <div class="carousel-wrapper">
      <button class="arrow left" onclick="scrollCarousel('cases', -1)">◀</button>
      <div id="cases" class="carousel"></div>
      <button class="arrow right" onclick="scrollCarousel('cases', 1)">▶</button>
    </div>
  </div>

  <!-- ===== SWITCHES ===== -->
  <div class="seccion">
    <h2>Switches</h2>
    <div class="carousel-wrapper">
      <button class="arrow left" onclick="scrollCarousel('switches', -1)">◀</button>
      <div id="switches" class="carousel"></div>
      <button class="arrow right" onclick="scrollCarousel('switches', 1)">▶</button>
    </div>
  </div>
</main>

<div id="overlayCarrito" class="overlay" onclick="cerrarCarrito()"></div>
<div id="miniCarrito" class="mini-carrito">
  <h3>Carrito</h3>
  <div id="contenidoCarrito"></div>
</div>

 <div id="footer-container"></div>

<script src="app.js"></script>

<div id="modalAuth" class="modal-auth">
  <div class="modal-auth-box">
    <button class="modal-auth-close" onclick="cerrarModalAuth()">✕</button>
    <h2 id="authTitulo">Iniciar sesión</h2>
    <input type="email" id="authEmail" placeholder="Email" />
    <input type="password" id="authPassword" placeholder="Contraseña" />
    <p id="authError" style="color:#e74c3c;font-size:12px;min-height:16px"></p>
    <button id="authSubmit">Entrar</button>
    <p id="authLink" style="font-size:12px;text-align:center"></p>
  </div>
</div>
</body>
</html>
