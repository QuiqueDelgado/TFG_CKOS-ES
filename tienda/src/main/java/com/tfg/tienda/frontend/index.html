<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CKOS-ES</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="img/Logo.png" class="logo">
  <nav>
    <a href="#">Tienda</a>
    <a href="#">Categorías</a>
    <a href="#">Novedades</a>
    <a href="#">Contacto</a>
  </nav>
</header>

<div id="miniCarrito"></div>

<main>
  <div id="productos" class="grid"></div>
<div class="seccion">
  <h2>Cases</h2>
  <div class="carousel-wrapper">
    <button class="arrow left" onclick="scrollCarousel('cases', -1)">◀</button>
    <div id="cases" class="carousel"></div>
    <button class="arrow right" onclick="scrollCarousel('cases', 1)">▶</button>
  </div>
</div>

<div class="seccion">
  <h2>Switches</h2>
  <div class="carousel-wrapper">
    <button class="arrow left" onclick="scrollCarousel('switches', -1)">◀</button>
    <div id="switches" class="carousel"></div>
    <button class="arrow right" onclick="scrollCarousel('switches', 1)">▶</button>
  </div>
</div>

<div id="cases" class="carousel"></div>
<div id="switches" class="carousel"></div>

</main>

<script src="app.js"></script>
</body>
</html>
