<!DOCTYPE html>
<!--
  index.html — Página principal (home)

  Estructura:
    #header-container  → app.js carga header.html aquí con fetch
    .hero-producto     → producto destacado hardcodeado (id=27, Athena 1800)
    #cases / #switches → carruseles poblados dinámicamente por app.js > cargarProductos()
    #miniCarrito       → panel lateral; app.js lo pinta con pintarMiniCarrito()
    #footer-container  → app.js carga footer.html aquí con fetch

  Nota: el <meta viewport> está ausente aquí; está en checkout.html porque
  es la única página autónoma. Las demás páginas lo heredan del header.html
  incluido via fetch (si se añade allí).
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CKOS-ES</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div id="header-container"></div>
</header>

<main>

<div class="hero-producto">
  <img src="http://localhost:8080/img/productos/cases/Athena1800Banner.png" alt="Athena 1800">

  <div class="hero-info">
    <span class="badge">Nuevo</span>
    <h2>Athena 1800</h2>
    <p>Diseño premium 1800 compact con acabados de aluminio.</p>
    <button onclick="verProducto(27)">Ver producto</button>
  </div>

</div>
  <!-- ===== CASES ===== -->
  <div class="seccion">
    <h2>Cases</h2>
    <div class="carousel-wrapper">
      <button class="arrow left" onclick="scrollCarousel('cases', -1)">◀</button>
      <div id="cases" class="carousel"></div>
      <button class="arrow right" onclick="scrollCarousel('cases', 1)">▶</button>
    </div>
  </div>

  <!-- ===== SWITCHES ===== -->
  <div class="seccion">
    <h2>Switches</h2>
    <div class="carousel-wrapper">
      <button class="arrow left" onclick="scrollCarousel('switches', -1)">◀</button>
      <div id="switches" class="carousel"></div>
      <button class="arrow right" onclick="scrollCarousel('switches', 1)">▶</button>
    </div>
  </div>
</main>

<div id="overlayCarrito" class="overlay" onclick="cerrarCarrito()"></div>
<div id="miniCarrito" class="mini-carrito">
  <h3>Carrito</h3>
  <div id="contenidoCarrito"></div>
</div>

 <div id="footer-container"></div>

<script src="app.js"></script>

</body>
</html>
